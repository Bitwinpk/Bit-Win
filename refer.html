<!DOCTYPE html>
<html>
<head>
<title>Refer & Earn</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>👥 Refer & Earn</h1>

<p>Invite your friends and earn 100 coins.</p>

<button onclick="refer()">
Invite Friend
</button>

<br><br>

<a href="home.html">🏠 Back Home</a>

<script>
function refer(){

let coins =
Number(localStorage.getItem("coins"))||0;

coins+=100;

localStorage.setItem("coins",coins);

alert("100 Coins Added!");
}
</script>

</body>
</html>
